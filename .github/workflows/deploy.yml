name: Deploy – GitHub Pages

on:
  push:
    branches: ["**"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Parallele Deployments pro Branch, aber pro Branch nur einen laufenden Job
concurrency:
  group: "pages-${{ github.ref_name }}"
  cancel-in-progress: true

jobs:
  build:
    name: Build & upload artifact
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

  deploy:
    name: Deploy to GitHub Pages (${{ github.ref_name }})
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  update-about-url:
    name: Set repository About URL
    runs-on: ubuntu-latest
    needs: deploy
    # Nur auf main-Branch die About-URL setzen
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      administration: write
    steps:
      - name: Update repository homepage to custom domain
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl -s -o /dev/null -w "%{http_code}" \
            -X PATCH \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}" \
            -d '{"homepage":"https://landingpage.ladekompass.com","description":"ladeKompass – Dein EV-Ladekompass. Echtzeit-Stationssuche, Routenplanung und transparente Ladepreise."}'
